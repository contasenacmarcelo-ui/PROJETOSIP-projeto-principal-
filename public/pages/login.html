<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Readex+Pro:wght@160..700&family=Outfit:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/images/Design sem nome.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <header>
        <section class="side-left">
            <a href="/"><img src="../assets/images/acronimo_sip_iluminado_em_azul.png" alt="Logo"></a>
            <span>Sistema Integrado de Portfolio</span>
        </section>
            <section class="side-right">
            <a href="/public/pages/login.html">Entrar</a>
            <a href="/public/pages/cadastro.html">Cadastrar</a>
        </section>
        <div class="nav-celular">
            <div class="hamburger" id="btn-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="menu-mobile" id="menu-mobile">
            <a href="/public/pages/login.html">Entrar</a>
            <a href="/public/pages/cadastro.html">Cadastrar</a>
        </nav>
    </header>
    <main class="card-container">
        <div class="card-box">
            <h1 class="title">Acesse sua conta</h1>
            <section class="warning-box">
                <p>
                    Atenção: se o Chrome sugerir salvar a senha, não clique em recarregar a página. Use o botão ENTRAR para acessar o sistema.
                </p>
            </section>
            <section class="label-01">
                <p class="E-mail">E-mail</p>
<input autocomplete="off" name="login-email" class="input-E-mail" placeholder="E-mail" type="email" spellcheck="false" autocapitalize="none" inputmode="email" data-lpignore="true" data-form-type="other">
                <span class="erro-email"></span>
            </section>
            <section class="label-02">
                <p class="senha">Senha</p>

                <div class="senha-box">
<input autocomplete="new-password" name="login-password" class="input-senha" placeholder="Senha" type="password" spellcheck="false" aria-label="Senha" data-lpignore="true" data-form-type="other" >
                    <i class="bi bi-eye" id="toggleSenha"></i>
                </div>

                <span class="erro-senha"></span>
            </section>
<button class="btn-Entrar" type="button" id="btnEntrar">ENTRAR</button>

            <p class="txt2">Não tem conta? <a class="Cadastre-se-txt" href="cadastro.html">Cadastre-se</a></p>
        </div>
    </main>
    <script src="../js/login.js"></script>
    <script src="../js/menu.js"></script>
</body>
</html>

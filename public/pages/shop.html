<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/icone.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Readex+Pro:wght@160..700&family=Outfit:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/shop.css">
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="shortcut icon" href="../assets/images/Design sem nome.png" type="image/x-icon">
    <title>SIP | Consultoria</title>
</head>

<body>
    <header>
        <section class="side-left">
            <a href="index.html"><img src="../assets/images/acronimo_sip_iluminado_em_azul.png" alt="Logo"></a>
            <span>Sistema Integrado de Portfolio</span>
        </section>
        <section class="side-right">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </section>
        <div class="nav-celular">
            <div class="hamburger" id="btn-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="menu-mobile" id="menu-mobile">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </nav>
    </header>

    <main>
        <p class="paragrafo">
            <b>Seus Projetos,</b>
            Nossa Experiência.
        </p>

        <div class="line1"></div>

        <section class="squares-booking">
            <div class="card">
                <a href="landing-pages/ecommerce.html">
                    <img src="../assets/images/projeto1.png">
                </a>
                <span>App de E-Commerce</span>
            </div>

            <div class="card">
                <a href="landing-pages/dashboard.html">
                    <img src="../assets/images/projeto2.png">
                </a>
                <span>Dashboard Financeiro</span>
            </div>

            <div class="card">
                <a href="landing-pages/landingpage.html">
                    <img src="../assets/images/projeto3.png">
                </a>
                <span>Landing Page Criativa</span>
            </div>

            <div class="card">
                <a href="landing-pages/sistema.html">
                    <img src="../assets/images/projeto4.png">
                </a>
                <span>Sistema de Gestão</span>
            </div>

            <div class="card">
                <a href="landing-pages/mobile.html">
                    <img src="../assets/images/projeto5.png">
                </a>
                <span>Protótipo Mobile</span>
            </div>

            <div class="card">
                <a href="landing-pages/corporativo.html">
                    <img src="../assets/images/projeto6.png">
                </a>
                <span>Website Corporativo</span>
            </div>
        </section>

        <!-- BOTÃO ABRIR MODAL -->
        <div class="orcamento-container">
            <button class="btn-orcamento" id="abrirModal">Solicitar Orçamento</button>
        </div>
    </main>

    <!-- MODAL ORÇAMENTO -->
    <div class="modal" id="modalOrcamento">
        <div class="modal-content">
            <h2 class="modal-title">Solicitar Orçamento</h2>

            <input type="text" id="titulo" class="modal-input" placeholder="Título do projeto">
            <span class="erro-modal" id="erro-titulo"></span>

            <textarea id="descricao" class="modal-textarea" placeholder="Descrição do projeto (mín. 10 caracteres)"></textarea>
            <span class="erro-modal" id="erro-descricao"></span>

            <select id="tipo" class="modal-input">
                <option value="">Selecione o tipo</option>
                <option value="Website">Website</option>
                <option value="Aplicativo">Aplicativo</option>
                <option value="Sistema">Sistema</option>
                <option value="Landing Page">Landing Page</option>
                <option value="E-commerce">E-commerce</option>
                <option value="Outro">Outro</option>
            </select>
            <span class="erro-modal" id="erro-tipo"></span>

            <input type="date" id="prazo" class="modal-input">
            <span class="erro-modal" id="erro-prazo"></span>

            <div class="modal-erro-geral"></div>

            <div class="modal-buttons">
                <button class="btn-fechar" id="fecharModal">Fechar</button>
                <button class="btn-enviar" id="btnEnviar">Enviar</button>
            </div>
        </div>
    </div>

    <script src="../js/toast.js"></script>
    <script src="../js/shop.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@160..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/adm.css">
    <title>ADM | SIP</title>
</head>

<body>
    <header>
        <section class="side-left">
            <a href="index.html"><img src="../assets/images/acronimo_sip_iluminado_em_azul.png" alt="Logo"></a>
            <span>Sistema Integrado de Portfolio</span>
        </section>
        <section class="side-right">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </section>
        <div class="nav-celular">
            <div class="hamburger" id="btn-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="menu-mobile" id="menu-mobile">
            <a href="Login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </nav>
    </header>
    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Status</th>
                        <th></th> <!-- coluna ação -->
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>Marcelo</td>
                        <td><span class="on">Ativo</span></td>
                        <td><button class="btn-remove"><i class="bi bi-trash-fill"></i></button></td>
                    </tr>
                    <tr>
                        <td>002</td>
                        <td>Ana</td>
                        <td><span class="pendente">Pendente</span></td>
                        <td><button class="btn-remove"><i class="bi bi-trash-fill"></i></button></td>
                    </tr>
                    <tr>
                        <td>003</td>
                        <td>Matheus</td>
                        <td><span class="open">Em aberto</span></td>
                        <td><button class="btn-remove"><i class="bi bi-trash-fill"></i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </main>
    <script>
        const rows = document.querySelectorAll("tbody tr");
        const btn = document.getElementById("btn-menu");
        const menu = document.getElementById("menu-mobile");

        btn.addEventListener("click", () => {
            btn.classList.toggle("ativo");
            menu.classList.toggle("ativo");
        });

        document.addEventListener("click", (e) => {
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove("ativo");
                btn.classList.remove("ativo");
            }
        });

        // PAGINAÇÃO

        const pagination = document.getElementById("pagination");
        const rowsPerPage = 9;
        let currentPage = 1;

        function showPage(page) {
            currentPage = page;

            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;

            rows.forEach((row, index) => {
                row.style.display = (index >= start && index < end)
                    ? "table-row"
                    : "none";
            });

            updateButtons();
        }

        function createButtons() {
            const totalPages = Math.ceil(rows.length / rowsPerPage);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;

                btn.addEventListener("click", () => {
                    showPage(i);
                });

                pagination.appendChild(btn);
            }
        }

        // 🔥 AGORA FORA
        function updateButtons() {
            const buttons = pagination.querySelectorAll("button");

            buttons.forEach((btn, index) => {
                btn.classList.toggle("ativo", index + 1 === currentPage);
            });
        }

        createButtons();
        showPage(1);
    </script>
</body>

</html>

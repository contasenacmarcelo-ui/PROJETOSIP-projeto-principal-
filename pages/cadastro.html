<!DOCTYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SIP | Cadastre-se</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Readex+Pro:wght@160..700&family=Outfit:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="shortcut icon" href="../assets/images/Design sem nome.png" type="image/x-icon">
        <link rel="stylesheet" href="../css/cadastro.css">
    </head>

<body>
    <header>
        <section class="side-left">
            <a href="index.html"><img src="../assets/images/acronimo_sip_iluminado_em_azul.png" alt="Logo"></a>
            <span>Sistema Integrado de Portfolio</span>
        </section>
            <section class="side-right">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </section>
        <div class="nav-celular">
            <div class="hamburger" id="btn-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="menu-mobile" id="menu-mobile">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </nav>
    </header>
    <main class="card-container">
        <div class="card-box">
            <h1 class="title">Cadastre-se</h1>
            <section>
                <label class="nome" for="nomeInput">Nome</label>
                <input placeholder="Nome" class="Nome" type="text" id="nomeInput">
            </section>
            <section class="label-01">
                <p class="E-mail">E-mail</p>
                <input class="input-E-mail" placeholder="E-mail" type="text">
                <span class="erro-email"></span>
            </section>
            <section class="label-01">
                <p class="Telefone">Telefone</p>
                <input class="input-telefone mascara-telefone" placeholder="(11) 98765-4321" type="text" id="telefone" maxlength="15">
                <span class="erro-telefone"></span>
            </section>
            <section class="label-02">
                <p class="senha">Senha</p>
                <div class="senha-box">
                    <input class="input-senha" placeholder="Senha" type="password">
                    <i class="bi bi-eye" id="toggleSenha"></i>
                </div>
                <span class="erro-senha"></span>
                <span class="forca-senha"></span>
            </section>
            <section class="label-02">
                <p class="senha">Confirmar Senha</p>
                <div class="senha-box">
                    <input class="input-confirmar" placeholder="Confirmar senha" type="password">
                    <i class="bi bi-eye" id="toggleConfirmar"></i>
                </div>
                <span class="erro-confirmar"></span>
            </section>
            <label class="termos-container" for="checkbox">
                <input type="checkbox" name="checkbox" id="checkbox">
                <p>Aceito os <a href="serviceterm.html" class="checkboxA">termos de serviço.</a></p>
            </label>
            <span class="erro-termos"></span>
            <button class="btn-Entrar">CADASTRE-SE</button>
            <p class="txt2">Tem uma conta? <a class="Cadastre-se-txt" href="login.html">Entre</a></p>
        </div>
    </main>
    <script src="../js/mascara-telefone.js"></script>
    <script src="../js/cadastro.js"></script>
    <script src="../js/menu.js"></script>
</body>

</html>

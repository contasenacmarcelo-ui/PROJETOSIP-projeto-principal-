<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP | ADM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Readex+Pro:wght@160..700&family=Outfit:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admia.css">
    <link rel="shortcut icon" href="../assets/images/Design sem nome.png" type="image/x-icon">
</head>

<body>
    <header>
        <section class="side-left">
            <a href="index.html"><img src="../assets/images/acronimo_sip_iluminado_em_azul.png" alt="Logo"></a>
            <span>Sistema Integrado de Portfolio</span>
        </section>
        <section class="side-right">
            <a href="login.html">Entrar</a>
            <a href="cadastro.html">Cadastrar</a>
        </section>
    <div class="nav-celular">
            <div class="hamburger" id="btn-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="menu-mobile" id="menu-mobile">
                <a href="login.html">Entrar</a>
                <a href="cadastro.html">Cadastrar</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="divbotaun">
            <button class="btn-add" onclick="abrirModal()">
                + Novo Usuário
            </button>
        </div>
        <div class="modal" id="modal">
            <div class="modal-content">
                <span class="fechar" onclick="fecharModal()">&times;</span>

                <h2>Novo Usuário</h2>

                <input type="text" id="nome" placeholder="Nome">
                <input type="email" id="email" placeholder="E-mail">
                <input type="text" id="telefone" placeholder="Telefone">

                <select id="status">
                    <option value="Ativo">Ativo</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Em aberto">Em aberto</option>
                </select>

                <button onclick="adicionarUsuario()">Adicionar</button>
            </div>
        </div>

        <!-- MODAL DETALHES DO USUÁRIO -->
        <div class="modal" id="modal-detalhes">
            <div class="modal-content modal-lg">
                <span class="fechar" onclick="fecharModalDetalhes()">&times;</span>
                <h2>Detalhes do Usuário</h2>

                <div class="detalhes-secao">
                    <h3><i class="bi bi-person"></i> Dados Pessoais</h3>
                    <p><strong>Nome:</strong> <span id="det-nome">—</span></p>
                    <p><strong>E-mail:</strong> <span id="det-email">—</span></p>
                    <p><strong>Telefone:</strong> <span id="det-telefone">—</span></p>
                    <p><strong>Status:</strong> <span id="det-status">—</span></p>
                </div>

                <div class="detalhes-secao">
                    <h3><i class="bi bi-clipboard-check"></i> Pedidos / Projetos</h3>
                    <div id="det-pedidos" class="detalhes-lista">
                        <p class="sem-dados">Nenhum pedido encontrado.</p>
                    </div>
                </div>

                <div class="detalhes-secao">
                    <h3><i class="bi bi-headset"></i> Chamados de Suporte</h3>
                    <div id="det-suportes" class="detalhes-lista">
                        <p class="sem-dados">Nenhum chamado encontrado.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Status</th>
                        <th></th> <!-- coluna ação -->
                    </tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>
        </div>
    </main>
   <script src="../js/admia.js"></script>
</body>
</html>
